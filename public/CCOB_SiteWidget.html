<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Center Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  background: transparent;
  font-family: 'Nunito Sans', sans-serif;
  color: #1a1a3e;
  overflow-x: hidden;
}

/* ── Status Banner ───────────────────────────────────── */
#status-card {
  width: 100%;
  padding: 22px 28px 24px;
  border-radius: 16px;
  border: 2px solid transparent;
  transition: background 0.5s, border-color 0.5s;
  margin-bottom: 24px;
}
#status-card.operational {
  background: rgba(34,197,94,0.07);
  border-color: rgba(34,197,94,0.32);
}
#status-card.down {
  background: rgba(239,68,68,0.06);
  border-color: rgba(239,68,68,0.3);
  animation: down-pulse 3s ease-in-out infinite;
}
#status-card.loading, #status-card.error {
  background: rgba(107,122,153,0.05);
  border-color: rgba(107,122,153,0.15);
}
@keyframes down-pulse {
  0%,100% { border-color: rgba(239,68,68,0.3); }
  50%      { border-color: rgba(239,68,68,0.08); }
}

.sc-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.sc-dot {
  width: 15px; height: 15px;
  border-radius: 50%;
  flex-shrink: 0;
}
#status-card.operational .sc-dot {
  background: #22c55e;
  box-shadow: 0 0 10px rgba(34,197,94,0.75);
  animation: breathe 3s ease-in-out infinite;
}
#status-card.down .sc-dot {
  background: #ef4444;
  box-shadow: 0 0 10px rgba(239,68,68,0.75);
  animation: pdot 1.2s ease-in-out infinite;
}
#status-card.loading .sc-dot,
#status-card.error   .sc-dot { background: #c4c9d8; }

@keyframes breathe { 0%,100%{box-shadow:0 0 4px rgba(34,197,94,.4)}50%{box-shadow:0 0 18px rgba(34,197,94,1)} }
@keyframes pdot    { 0%,100%{box-shadow:0 0 4px rgba(239,68,68,.4)}50%{box-shadow:0 0 18px rgba(239,68,68,1)} }

.sc-label {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 0.01em;
  line-height: 1;
  flex: 1;
}
#status-card.operational .sc-label { color: #15803d; }
#status-card.down        .sc-label { color: #dc2626; }
#status-card.loading     .sc-label,
#status-card.error       .sc-label { color: #9ca3af; font-size: 16px; font-weight: 700; }

.sc-time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #9ca3af;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.sc-message {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
  padding-left: 29px;
  margin-top: 6px;
}
#status-card.operational .sc-message { color: #16a34a; }
#status-card.down        .sc-message { color: #b91c1c; }

.sc-standby-sub {
  font-size: 13px;
  font-weight: 600;
  padding-left: 29px;
  margin-top: 3px;
  color: #b91c1c;
  opacity: 0.65;
  display: none;
}

.spinner {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2px solid rgba(107,122,153,0.2);
  border-top-color: #9ca3af;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SMS Section ─────────────────────────────────────── */
.sms-heading {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #8892aa;
  margin-bottom: 14px;
}

/* Each message is a prominent card */
.msg-card {
  background: #fff;
  border: 1.5px solid rgba(107,122,153,0.14);
  border-radius: 14px;
  padding: 18px 22px 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(26,26,62,0.05);
  position: relative;
  overflow: hidden;
}
.msg-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(180deg, #6366f1, #8b5cf6);
  border-radius: 14px 0 0 14px;
}
.msg-card:first-child::before {
  background: linear-gradient(180deg, #3b82f6, #6366f1);
}

.msg-body {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a3e;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 12px;
}

.msg-footer {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.msg-datetime {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: #4f46e5;
  letter-spacing: 0.08em;
  white-space: nowrap;
  background: rgba(99,102,241,0.07);
  border: 1px solid rgba(99,102,241,0.18);
  padding: 4px 12px;
  border-radius: 6px;
}

.sms-empty {
  font-size: 14px;
  color: #9ca3af;
  text-align: center;
  padding: 28px 0;
  font-style: italic;
}
</style>
</head>
<body>

<!-- Status Banner -->
<div id="status-card" class="loading">
  <div class="sc-row">
    <span class="sc-dot"></span>
    <span class="sc-label" id="sc-label"><span class="spinner"></span>Checking status…</span>
    <span class="sc-time" id="sc-time"></span>
  </div>
  <div class="sc-message" id="sc-message"></div>
  <div class="sc-standby-sub" id="sc-sub">for text message updates</div>
</div>

<!-- Recent SMS -->
<div class="sms-heading">Recent Staff Alerts</div>
<div id="sms-list"><div class="sms-empty">Loading…</div></div>

<script>
const params  = new URLSearchParams(window.location.search);
const CC      = params.get('cc') || 'mitel';
const BACKEND = (params.get('backend') || window.location.origin).replace(/\/$/, '');
const LIMIT   = parseInt(params.get('limit') || '5');
const POLL_MS = 30000;

const CC_NAMES = { savvy: 'Savvy Phone', mitel: 'Mitel Classic' };
const CC_NAME  = params.has('name') ? params.get('name') : (CC_NAMES[CC] ?? CC);
const PREFIX   = CC_NAME ? CC_NAME + ' — ' : '';

// ── Status ────────────────────────────────────────────
function renderStatus(state, message, updatedAt) {
  const card   = document.getElementById('status-card');
  const label  = document.getElementById('sc-label');
  const msg    = document.getElementById('sc-message');
  const time   = document.getElementById('sc-time');
  const sub    = document.getElementById('sc-sub');

  card.className = state;

  const labels = {
    operational: PREFIX + 'Operational',
    down:        PREFIX + 'Standby',
    loading:     'Checking status…',
    error:       'Status unavailable',
  };
  label.textContent = labels[state] || labels.error;
  msg.textContent   = (state === 'operational' || state === 'down') ? (message || '') : '';
  sub.style.display = state === 'down' ? 'block' : 'none';
  time.textContent  = updatedAt
    ? 'Updated ' + new Date(updatedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'America/New_York' }) + ' ET'
    : '';
}

async function fetchStatus() {
  try {
    const r = await fetch(BACKEND + '/api/status');
    if (!r.ok) throw new Error();
    const d  = await r.json();
    const cc = CC === 'savvy' ? d.savvyPhone : d.mitelClassic;
    renderStatus(cc?.state === 'UP' ? 'operational' : 'down', cc?.message || '', d.updatedAt);
  } catch { renderStatus('error', '', null); }
}

// ── SMS ───────────────────────────────────────────────
function fmtDatetime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/New_York' })
    + '  '
    + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' })
    + ' ET';
}

function escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderSms(entries) {
  const list = document.getElementById('sms-list');
  if (!entries || entries.length === 0) {
    list.innerHTML = '<div class="sms-empty">No staff alerts sent yet.</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => {
    return '<div class="msg-card">'
      + '<div class="msg-body">' + escape(e.message) + '</div>'
      + '<div class="msg-footer">'
      + '<span class="msg-datetime">' + fmtDatetime(e.sentAt) + '</span>'
      + '</div>'
      + '</div>';
  }).join('');
}

async function fetchSms() {
  try {
    const r = await fetch(BACKEND + '/api/sms-history?limit=50');
    if (!r.ok) throw new Error();
    const data = await r.json();
    const cutoff = Date.now() - 8 * 60 * 60 * 1000;
    const filtered = data
      .filter(e => (e.groups || []).some(g => /agents|supervisors/i.test(g)))
      .filter(e => new Date(e.sentAt).getTime() >= cutoff)
      .slice(0, LIMIT);
    renderSms(filtered);
  } catch {
    document.getElementById('sms-list').innerHTML = '<div class="sms-empty">Could not load message history.</div>';
  }
}

renderStatus('loading', '', null);
fetchStatus();
fetchSms();
setInterval(fetchStatus, POLL_MS);
setInterval(fetchSms,   POLL_MS);
</script>
</body>
</html>
