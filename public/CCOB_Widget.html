<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Center Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  font-family: 'Nunito Sans', sans-serif;
  overflow: hidden;
}

#widget {
  display: flex;
  flex-direction: column;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 70px;
  padding: 12px 18px;
  border-radius: 10px;
  transition: all 0.6s ease;
}

#widget.operational {
  background: rgba(34,197,94,0.08);
  border: 1.5px solid rgba(34,197,94,0.3);
}

#widget.down {
  background: rgba(239,68,68,0.08);
  border: 1.5px solid rgba(239,68,68,0.3);
  animation: down-pulse 3s ease-in-out infinite;
}

#widget.loading, #widget.error {
  background: rgba(107,122,153,0.06);
  border: 1.5px solid rgba(107,122,153,0.15);
}

@keyframes down-pulse {
  0%, 100% { border-color: rgba(239,68,68,0.3); }
  50%       { border-color: rgba(239,68,68,0.08); }
}

.widget-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

#widget.operational .status-dot {
  background: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.7);
  animation: breathe 3s ease-in-out infinite;
}

#widget.down .status-dot {
  background: #ef4444;
  box-shadow: 0 0 8px rgba(239,68,68,0.7);
  animation: pulse 1.2s ease-in-out infinite;
}

#widget.loading .status-dot,
#widget.error   .status-dot {
  background: #9ca3af;
  box-shadow: none;
}

@keyframes breathe {
  0%, 100% { box-shadow: 0 0 4px rgba(34,197,94,0.5); }
  50%       { box-shadow: 0 0 14px rgba(34,197,94,1); }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 4px rgba(239,68,68,0.5); }
  50%       { box-shadow: 0 0 14px rgba(239,68,68,1); }
}

.status-label {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.01em;
  line-height: 1;
}

#widget.operational .status-label { color: #15803d; }
#widget.down        .status-label { color: #dc2626; }
#widget.loading     .status-label { color: #9ca3af; font-weight: 700; }
#widget.error       .status-label { color: #9ca3af; font-weight: 700; }

.status-message {
  font-size: 12px;
  font-weight: 700;
  margin-top: 5px;
  padding-left: 21px;
  line-height: 1.3;
}

#widget.operational .status-message { color: #16a34a; }
#widget.down        .status-message { color: #b91c1c; }
#widget.loading     .status-message,
#widget.error       .status-message { color: #9ca3af; }

.updated {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: #9ca3af;
  margin-left: auto;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 2px solid rgba(107,122,153,0.2);
  border-top-color: #9ca3af;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="widget" class="loading">
  <div class="widget-row">
    <span class="status-dot"></span>
    <span class="status-label" id="status-label"><span class="spinner"></span></span>
    <span class="updated" id="updated"></span>
  </div>
  <div class="status-message" id="status-message"></div>
</div>

<script>
// ── Config from URL params ──────────────────────────────────────────────────
// Usage: CCOB_Widget.html?cc=savvy&key=YOUR_KEY&backend=https://your-server.com
// cc: "savvy" (default) or "mitel"
const params  = new URLSearchParams(window.location.search);
const CC      = params.get('cc') || 'savvy';
const API_KEY = params.get('key') || '';
const BACKEND = (params.get('backend') || window.location.origin).replace(/\/$/, '');
const POLL_MS = 30000;

const CC_NAMES = { savvy: 'Savvy Phone', mitel: 'Mitel Classic' };

function render(state, message, updatedAt) {
  const widget  = document.getElementById('widget');
  const labelEl = document.getElementById('status-label');
  const msgEl   = document.getElementById('status-message');
  const timeEl  = document.getElementById('updated');

  widget.className = state;

  const labels = {
    operational: `${CC_NAMES[CC] || CC} — Operational`,
    down:        `${CC_NAMES[CC] || CC} — Down`,
    loading:     'Checking status…',
    error:       'Status unavailable'
  };

  labelEl.textContent = labels[state] || labels.error;
  msgEl.textContent   = (state === 'operational' || state === 'down') ? (message || '') : '';

  if (updatedAt) {
    const t = new Date(updatedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    timeEl.textContent = `Updated ${t}`;
  } else {
    timeEl.textContent = '';
  }
}

async function fetchStatus() {
  if (!API_KEY) {
    render('error', '', null);
    document.getElementById('updated').textContent = 'key param missing';
    return;
  }

  try {
    const resp = await fetch(`${BACKEND}/api/status`, {
      headers: { 'x-api-key': API_KEY }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const cc      = CC === 'savvy' ? data.savvyPhone : data.mitelClassic;
    const state   = cc?.state === 'UP' ? 'operational' : 'down';
    const message = cc?.message || '';

    render(state, message, data.updatedAt);
  } catch (err) {
    render('error', '', null);
    document.getElementById('updated').textContent = 'Unavailable';
  }
}

render('loading', '', null);
fetchStatus();
setInterval(fetchStatus, POLL_MS);
</script>
</body>
</html>
