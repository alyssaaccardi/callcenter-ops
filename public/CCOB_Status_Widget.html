<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  font-family: 'Nunito Sans', sans-serif;
  overflow: hidden;
}

#widget {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 60px;
  padding: 10px 16px;
  border-radius: 8px;
  transition: all 0.6s ease;
}

/* ── STATES ── */
#widget.operational {
  background: rgba(34,197,94,0.1);
  border: 1.5px solid rgba(34,197,94,0.35);
}

#widget.standby {
  background: rgba(239,68,68,0.1);
  border: 1.5px solid rgba(239,68,68,0.35);
  animation: standby-pulse 3s ease-in-out infinite;
}

#widget.loading {
  background: rgba(107,122,153,0.08);
  border: 1.5px solid rgba(107,122,153,0.2);
}

#widget.error {
  background: rgba(107,122,153,0.06);
  border: 1.5px solid rgba(107,122,153,0.15);
}

@keyframes standby-pulse {
  0%, 100% { border-color: rgba(239,68,68,0.35); }
  50%       { border-color: rgba(239,68,68,0.08); }
}

.widget-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.5s;
}

#widget.operational .status-dot {
  background: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.7);
  animation: dot-breathe 3s ease-in-out infinite;
}

#widget.standby .status-dot {
  background: #ef4444;
  box-shadow: 0 0 8px rgba(239,68,68,0.7);
  animation: dot-pulse 1.2s ease-in-out infinite;
}

#widget.loading .status-dot,
#widget.error   .status-dot {
  background: #6b7a99;
  box-shadow: none;
}

@keyframes dot-breathe {
  0%, 100% { box-shadow: 0 0 4px rgba(34,197,94,0.5); }
  50%       { box-shadow: 0 0 12px rgba(34,197,94,1); }
}

@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 4px rgba(239,68,68,0.5); }
  50%       { box-shadow: 0 0 12px rgba(239,68,68,1); }
}

.status-text {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.01em;
  transition: color 0.5s;
}

#widget.operational .status-text { color: #15803d; }
#widget.standby     .status-text { color: #dc2626; }
#widget.loading     .status-text { color: #6b7a99; }
#widget.error       .status-text { color: #9ca3af; font-weight: 600; }

.last-updated {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: #9ca3af;
  margin-left: auto;
  white-space: nowrap;
  letter-spacing: 0.06em;
}

.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 2px solid rgba(107,122,153,0.2);
  border-top-color: #6b7a99;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="widget" class="loading">
  <div class="widget-inner">
    <span class="status-dot"></span>
    <span class="status-text" id="status-text">
      <span class="spinner"></span>
    </span>
    <span class="last-updated" id="last-updated"></span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG — set before deploying
// ══════════════════════════════════════════════
const CONFIG = {
  BIN_ID: '',              // JSONBin Bin ID
  JSONBIN_KEY: '',         // JSONBin X-Master-Key
  POLL_INTERVAL_MS: 60000  // 60 seconds
};

// ══════════════════════════════════════════════
// Also supports URL params for easy config:
// widget.html?bin=BIN_ID&key=MASTER_KEY
// ══════════════════════════════════════════════
(function applyUrlParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('bin'))  CONFIG.BIN_ID      = params.get('bin');
  if (params.get('key'))  CONFIG.JSONBIN_KEY = params.get('key');
})();

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(state, updatedAt) {
  const widget  = document.getElementById('widget');
  const textEl  = document.getElementById('status-text');
  const timeEl  = document.getElementById('last-updated');

  widget.className = state;

  const labels = {
    operational: '● All Systems Operational',
    standby:     '● Standby',
    loading:     'Checking status...',
    error:       'Status Unavailable'
  };

  if (state === 'loading') {
    textEl.innerHTML = '<span class="spinner"></span> Checking status...';
  } else {
    textEl.textContent = labels[state] || labels.error;
  }

  if (updatedAt) {
    const t = new Date(updatedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    timeEl.textContent = `Updated ${t}`;
  } else {
    timeEl.textContent = '';
  }
}

// ══════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════
async function fetchStatus() {
  if (!CONFIG.BIN_ID || !CONFIG.JSONBIN_KEY) {
    render('error', null);
    document.getElementById('last-updated').textContent = 'Not configured';
    return;
  }

  try {
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
      headers: { 'X-Master-Key': CONFIG.JSONBIN_KEY }
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const json = await resp.json();
    const data = json.record;

    // Widget ONLY shows operational or standby — never system names or DIDs
    const publicState = data.publicState === 'operational' ? 'operational' : 'standby';
    render(publicState, data.updatedAt);

  } catch (err) {
    render('error', null);
    document.getElementById('last-updated').textContent = 'Unavailable';
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render('loading', null);
fetchStatus();
setInterval(fetchStatus, CONFIG.POLL_INTERVAL_MS);
</script>
</body>
</html>
